name: OralExamAMH
options:
  bundleIdPrefix: au.com.oralexamh
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: 94ST3AMFX7
targets:
  OralExamAMH:
    type: application
    platform: iOS
    sources:
      - path: OralExamAMH
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.oralexamh.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Oral Exam AMH
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - OralExamAMHTests
  OralExamAMHTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OralExamAMHTests
    dependencies:
      - target: OralExamAMH
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: au.com.oralexamh.tests
        GENERATE_INFOPLIST_FILE: YES
